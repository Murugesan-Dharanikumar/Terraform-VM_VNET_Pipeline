trigger:
- main

pool:
  name: DEVPIPELINE

variables:
  backendServiceArm: 'Azure-Service-Connection'
  backendResourceGroupName: 'mypipeline-rg'
  backendStorageAccountName: 'pipelinestroageaccount'
  backendContainerName: 'storagecontainerspipe'
  backendKey: 'terraform.tfstate'
  terraformVersion: 'latest'
  workingDirectory: '$(System.DefaultWorkingDirectory)'

stages:

# =========================
# VALIDATE
# =========================
- stage: Validate
  displayName: Terraform Validate
  jobs:
  - job: Validate
    displayName: Validate Terraform
    steps:

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '$(terraformVersion)'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDirectory)'
        backendServiceArm: '$(backendServiceArm)'
        backendAzureRmResourceGroupName: '$(backendResourceGroupName)'
        backendAzureRmStorageAccountName: '$(backendStorageAccountName)'
        backendAzureRmContainerName: '$(backendContainerName)'
        backendAzureRmKey: '$(backendKey)'

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(workingDirectory)'


# =========================
# PLAN
# =========================
- stage: Plan
  displayName: Terraform Plan
  dependsOn: Validate

  jobs:
  - job: Plan
    displayName: Terraform Plan
    steps:

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: '$(terraformVersion)'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDirectory)'
        backendServiceArm: '$(backendServiceArm)'
        backendAzureRmResourceGroupName: '$(backendResourceGroupName)'
        backendAzureRmStorageAccountName: '$(backendStorageAccountName)'
        backendAzureRmContainerName: '$(backendContainerName)'
        backendAzureRmKey: '$(backendKey)'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDirectory)'
        environmentServiceNameAzureRM: '$(backendServiceArm)'


# =========================
# APPLY
# =========================
- stage: Apply
  displayName: Terraform Apply
  dependsOn: Plan

  jobs:
  - deployment: Apply
    displayName: Terraform Apply
    environment: dev

    strategy:
      runOnce:
        deploy:
          steps:

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: '$(terraformVersion)'

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(workingDirectory)'
              backendServiceArm: '$(backendServiceArm)'
              backendAzureRmResourceGroupName: '$(backendResourceGroupName)'
              backendAzureRmStorageAccountName: '$(backendStorageAccountName)'
              backendAzureRmContainerName: '$(backendContainerName)'
              backendAzureRmKey: '$(backendKey)'

          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(workingDirectory)'
              commandOptions: '-auto-approve'
              environmentServiceNameAzureRM: '$(backendServiceArm)'